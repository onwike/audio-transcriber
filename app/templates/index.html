<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Audio Transcriber</title>
  <link rel="icon" href="/static/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/static/icon.svg">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header>
    <img src="/static/icon.svg" alt="" class="app-icon" width="80" height="80">
    <h1>Audio Transcriber</h1>
    <p class="subtitle">WHISPER · CLAUDE · CLEAN PDF + MARKDOWN</p>
  </header>

  <main>
    <section id="screen-upload" class="screen active">
      <label class="dropzone" id="dropzone">
        <input type="file" id="file-input" accept="audio/*,video/*,.mp3,.m4a,.wav,.flac,.ogg,.oga,.opus,.aac,.webm,.mp4,.wma" hidden>
        <div class="dropzone-text">
          <strong>Drop an audio file here</strong>
          <span>or click to choose</span>
        </div>
        <div class="dropzone-formats">mp3 · m4a · wav · flac · ogg · opus · webm · mp4 · aac</div>
      </label>

      <fieldset class="model-picker" aria-label="Whisper model">
        <legend>Whisper model</legend>
        <div class="model-options">
          <label class="model-option">
            <input type="radio" name="whisper_model" value="small">
            <span class="model-name">Small</span>
            <span class="model-note">fastest · noticeable accuracy drop</span>
          </label>
          <label class="model-option">
            <input type="radio" name="whisper_model" value="medium">
            <span class="model-name">Medium</span>
            <span class="model-note">balanced · small accuracy drop</span>
          </label>
          <label class="model-option">
            <input type="radio" name="whisper_model" value="large-v3-turbo" checked>
            <span class="model-name">Turbo</span>
            <span class="model-note">recommended · 5× faster than large‑v3</span>
          </label>
          <label class="model-option">
            <input type="radio" name="whisper_model" value="large-v3">
            <span class="model-name">Large v3</span>
            <span class="model-note">slowest · highest accuracy</span>
          </label>
        </div>
      </fieldset>

      <p class="hint">Long audio is fine — chunking is automatic.</p>
    </section>

    <section id="screen-progress" class="screen">
      <div class="job-meta">
        <strong id="prog-filename"></strong>
        <span id="prog-fileinfo"></span>
      </div>
      <ol class="phases">
        <li data-phase="ingest"><span class="phase-dot"></span><span class="phase-label">Ingest</span></li>
        <li data-phase="transcribe"><span class="phase-dot"></span><span class="phase-label">Transcribe</span></li>
        <li data-phase="polish"><span class="phase-dot"></span><span class="phase-label">Polish</span></li>
        <li data-phase="export"><span class="phase-dot"></span><span class="phase-label">Export</span></li>
      </ol>
      <div class="progress-bar">
        <div class="progress-fill" id="prog-fill"></div>
      </div>
      <p class="status-message" id="prog-message">Starting…</p>
      <p class="elapsed">Elapsed <span id="prog-elapsed">0:00</span></p>
      <div class="progress-actions">
        <button id="pause-resume-btn" class="btn btn-secondary hidden" type="button">Pause</button>
        <button id="cancel-btn" class="btn btn-text hidden" type="button">Stop</button>
      </div>
    </section>

    <section id="screen-result" class="screen">
      <div class="result-actions">
        <a id="download-pdf" class="btn btn-primary" download>Download PDF</a>
        <a id="download-md" class="btn" download>Download Markdown</a>
        <button id="repolish-btn" class="btn btn-secondary">Re-polish</button>
        <button id="restart-btn" class="btn btn-text">Start over</button>
      </div>
      <article id="transcript-preview" class="transcript-preview"></article>
    </section>

    <div id="error-banner" class="error-banner hidden">
      <strong>Something went wrong</strong>
      <p id="error-message"></p>
      <button id="error-dismiss" class="btn btn-text">Start over</button>
    </div>
  </main>

  <script src="/static/app.js" defer></script>
</body>
</html>
